// ─── STORAGE ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = "dilna_zakazky_v3";
function loadZakazky() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return DEMO_DATA; }
}
function saveZakazky(z) {

}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const addDays = (date, days) => { const d = new Date(date); d.setDate(d.getDate() + days); return d; };
const toISO = (date) => date.toISOString().slice(0, 10);
const parseDate = (str) => new Date(str + "T00:00:00");
const formatCZ = (str) => str ? parseDate(str).toLocaleDateString("cs-CZ", { day: "numeric", month: "numeric", year: "numeric" }) : "–";
const getISOWeek = (date) => {
  const d = new Date(date); d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const w1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
};
const getMondayOf = (date) => {
  const d = new Date(date); d.setHours(0,0,0,0);
  d.setDate(d.getDate() - ((d.getDay() + 6) % 7)); return d;
};
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// ─── GANTT UTILS ──────────────────────────────────────────────────────────────
// phases are now stored per-zakazka as { phaseId: { start: ISO, dur: days } }
// They are INDEPENDENT – not chained. User drags them freely.

function phaseEnd(ph) {
  return toISO(addDays(parseDate(ph.start), ph.dur - 1));
}

// ─── CASCADE HELPER (also used by GanttView for live drag preview) ────────────
// Work purely in integer days to avoid timezone/rounding issues
function dateToDay(iso) {
  // Days since epoch, computed purely from the date string to avoid TZ issues
  const [y, m, d] = iso.split("-").map(Number);
  return Math.round(Date.UTC(y, m - 1, d) / 86400000);
}
function dayToISO(day) {
  const d = new Date(day * 86400000);
  const y = d.getUTCFullYear();
  const m = String(d.getUTCMonth() + 1).padStart(2, "0");
  const dd = String(d.getUTCDate()).padStart(2, "0");
  return `${y}-${m}-${dd}`;
}

function computeCascade(phases, phaseId, newStart) {
  const ORDER = ["koncepce", "konstrukce", "vyroba", "montaz"];
  const movedIdx = ORDER.indexOf(phaseId);
  const result = { ...phases };
  result[phaseId] = { ...result[phaseId], start: newStart };

  // Push FORWARD: if cur end-day > nxt start-day → push nxt to start right after cur
  for (let i = movedIdx; i < ORDER.length - 1; i++) {
    const cur = result[ORDER[i]];
    const nxt = result[ORDER[i + 1]];
    if (!cur || !nxt) continue;
    const curEndDay = dateToDay(cur.start) + cur.dur; // exclusive end (first day after)
    const nxtStartDay = dateToDay(nxt.start);
    if (curEndDay > nxtStartDay) {
      result[ORDER[i + 1]] = { ...nxt, start: dayToISO(curEndDay) };
    }
  }

  // Push BACKWARD: if prev end-day > cur start-day → push prev back
  for (let i = movedIdx; i > 0; i--) {
    const cur = result[ORDER[i]];
    const prev = result[ORDER[i - 1]];
    if (!cur || !prev) continue;
    const prevEndDay = dateToDay(prev.start) + prev.dur;
    const curStartDay = dateToDay(cur.start);
    if (prevEndDay > curStartDay) {
      result[ORDER[i - 1]] = { ...prev, start: dayToISO(curStartDay - prev.dur) };
    }
  }

  return result;
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [zakazky, setZakazky] = useState(() => loadZakazky());
  const [tab, setTab]         = useState("gantt");
  const [modal, setModal]     = useState(null);
  const [showAll, setShowAll] = useState(true);
  const [zoomIdx, setZoomIdx] = useState(DEFAULT_ZOOM);
  const [startOffset, setStartOffset] = useState(-2);

  useEffect(() => { saveZakazky(zakazky); }, [zakazky]);

  const upsertZakazka = (z) => {
    setZakazky(prev => {
      const exists = prev.find(x => x.id === z.id);
      return exists ? prev.map(x => x.id === z.id ? z : x) : [...prev, z];
    });
  };
  const deleteZakazka = (id) => setZakazky(prev => prev.filter(z => z.id !== id));

  const updatePhase = useCallback((zakazkaId, phaseId, newStart) => {
    setZakazky(prev => prev.map(z => {
      if (z.id !== zakazkaId) return z;
      return { ...z, phases: computeCascade(z.phases, phaseId, newStart) };
    }));
  }, []);

  const filteredZakazky = showAll ? zakazky : zakazky.filter(z => z.stav === "Probíhá" || z.stav === "Nová");

  // Stats
  const todayStr = toISO(new Date());
  const overdue = zakazky.filter(z => {
    const ends = Object.values(z.phases || {}).filter(Boolean).map(p => phaseEnd(p));
    const last = ends.sort().at(-1);
    return last && last < todayStr && z.stav !== "Hotovo";
  }).length;

  return (
    <div className="app">
      <style>{S}</style>

      <header className="hdr">
        <div className="brand">
          <div className="brand-box">⚙</div>
          <div>
            <div className="brand-title">DÍLENSKÝ PLÁNOVAČ</div>
            <div className="brand-sub">drag &amp; drop · Gantt · Kapacity</div>
          </div>
        </div>
        <div className="hdr-right">
          <button className="btn btn-ghost" onClick={() => setModal({ type:"new" })}>+ Zakázka</button>
        </div>
      </header>

      <div className="tabs">
        {[["gantt","📊 Gantt"], ["prehled","📋 Přehled"]].map(([id,lbl]) => (
          <button key={id} className={`tab${tab===id?" active":""}`} onClick={() => setTab(id)}>{lbl}</button>
        ))}
      </div>

      {tab === "gantt" && (
        <GanttView
          zakazky={filteredZakazky}
          zoomIdx={zoomIdx} setZoomIdx={setZoomIdx}
          startOffset={startOffset} setStartOffset={setStartOffset}
          showAll={showAll} setShowAll={setShowAll}
          onUpdatePhase={updatePhase}
          onEditZakazka={(z) => setModal({ type:"edit", zakazka: z })}
        />
      )}

      {tab === "prehled" && (
        <div className="content">
          <div className="stats">
            <div className="stat"><div className="stat-lbl">Zakázek</div><div className="stat-val" style={{color:"var(--kst)"}}>{zakazky.length}</div></div>
            <div className="stat"><div className="stat-lbl">Probíhá</div><div className="stat-val">{zakazky.filter(z=>z.stav==="Probíhá").length}</div></div>
            <div className="stat"><div className="stat-lbl">Po termínu</div><div className="stat-val" style={{color:"var(--danger)"}}>{overdue}</div></div>
            <div className="stat"><div className="stat-lbl">Dokončeno</div><div className="stat-val" style={{color:"var(--vyr)"}}>{zakazky.filter(z=>z.stav==="Hotovo").length}</div></div>
          </div>
          <div className="tbl-wrap">
            <table>
              <thead>
                <tr><th>ID</th><th>Název</th><th>Zákazník</th><th>Fáze</th><th>Stav</th><th></th></tr>
              </thead>
              <tbody>
                {zakazky.map(z => (
                  <tr key={z.id} style={{cursor:"pointer"}} onClick={() => setModal({type:"edit",zakazka:z})}>
                    <td><span className="mono" style={{color:"var(--kst)",fontWeight:700}}>{z.id}</span></td>
                    <td style={{fontWeight:600}}>{z.name}</td>
                    <td style={{color:"var(--muted)"}}>{z.customer||"–"}</td>
                    <td>
                      <div className="faze-pills">
                        {ALL_FAZE.map(f => z.phases?.[f.id] ? (
                          <span key={f.id} className="faze-pill" style={{background:f.color}}>{f.short} {z.phases[f.id].dur}d</span>
                        ) : null)}
                      </div>
                    </td>
                    <td><span className="badge" style={{background:`${STAV_COLORS[z.stav]}20`,color:STAV_COLORS[z.stav]}}>{z.stav}</span></td>
                    <td><button className="btn btn-ghost" style={{fontSize:10,padding:"4px 8px"}} onClick={e=>{e.stopPropagation();setModal({type:"edit",zakazka:z});}}>Upravit</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {modal && (
        <ZakazkaModal
          zakazka={modal.type==="edit" ? modal.zakazka : null}
          onSave={(z) => { upsertZakazka(z); setModal(null); }}
          onDelete={(id) => { deleteZakazka(id); setModal(null); }}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
}

// ─── GANTT VIEW ───────────────────────────────────────────────────────────────
function GanttView({ zakazky, zoomIdx, setZoomIdx, startOffset, setStartOffset, showAll, setShowAll, onUpdatePhase, onEditZakazka }) {
  const containerRef = useRef(null);
  const [tooltip, setTooltip] = useState(null);
  const [dragging, setDragging] = useState(null); // { zakazkaId, phaseId, origStart, origX }
  const [connector, setConnector] = useState(true);

  const zoom        = ZOOM_LEVELS[zoomIdx];
  const weekCount   = zoom.weeks;
  const dayPx       = zoom.dayPx;
  const showDays    = dayPx >= 14; // show individual day columns when zoomed in enough

  const todayMonday = getMondayOf(new Date());
  const ganttStart  = addDays(todayMonday, startOffset * 7);
  const totalDays   = weekCount * 7;

  // Build columns: days when zoomed in, weeks when zoomed out
  const days  = Array.from({ length: totalDays }, (_, i) => addDays(ganttStart, i));
  const weeks = Array.from({ length: weekCount }, (_, i) => addDays(ganttStart, i * 7));
  const todayStr = toISO(new Date());

  // Today line position
  const todayOffset = Math.round((parseDate(todayStr) - ganttStart) / 86400000);
  const todayPx = LABEL_W + todayOffset * dayPx;

  // Convert date → pixel X (relative to gantt-body left)
  const dateToPx = (dateStr) => {
    const diffDays = Math.round((parseDate(dateStr) - ganttStart) / 86400000);
    return LABEL_W + diffDays * dayPx;
  };

  const pxToDate = (px) => {
    const diffDays = Math.round((px - LABEL_W) / dayPx);
    return toISO(addDays(ganttStart, diffDays));
  };

  // ── DRAG HANDLERS ────────────────────────────────────────────────────────────
  // dragActive = user moved more than DEAD_ZONE pixels → real drag, not accidental click
  const DEAD_ZONE = 6; // px – must move this much before drag starts visually

  const onMouseDown = useCallback((e, zakazkaId, phaseId, currentStart) => {
    e.preventDefault();
    setDragging({
      zakazkaId, phaseId,
      origStart: currentStart,
      origX: e.clientX,
      currentStart,   // visual position (only changes after dead zone)
      active: false,  // becomes true once dead zone exceeded
    });
  }, []);

  useEffect(() => {
    if (!dragging) return;

    const onMove = (e) => {
      const dx = e.clientX - dragging.origX;
      // Don't start visual drag until dead zone exceeded
      if (!dragging.active && Math.abs(dx) < DEAD_ZONE) return;
      // Use floor so bar snaps to full-day grid smoothly (no half-day jumps)
      const daysDelta = Math.round(dx / dayPx);
      const newStart = dayToISO(dateToDay(dragging.origStart) + daysDelta);
      setDragging(d => ({ ...d, active: true, currentStart: newStart }));
    };

    const onUp = (e) => {
      const dx = e.clientX - dragging.origX;
      // If never left dead zone → treat as click, no move
      if (!dragging.active || Math.abs(dx) < DEAD_ZONE) {
        setDragging(null);
        return;
      }
      const daysDelta = Math.round(dx / dayPx);
      const newStart = dayToISO(dateToDay(dragging.origStart) + daysDelta);
      onUpdatePhase(dragging.zakazkaId, dragging.phaseId, newStart);
      setDragging(null);
    };

    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => { window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
  }, [dragging, dayPx, onUpdatePhase]);

  // ── RENDER ROWS for one section ───────────────────────────────────────────
  function renderRows(faze, sectionColor) {
    return zakazky.map((z, zi) => {
      const rowY = zi * ROW_H;
      return (
        <div className="gantt-row" key={z.id} data-id={z.id}>
          <div className="gantt-row-label" onClick={() => onEditZakazka(z)}>
            <div className="gantt-row-id">{z.id}</div>
            <div className="gantt-row-name">{z.name}</div>
          </div>
          <div className="gantt-cells" style={{position:"relative"}}>
            {showDays
              ? days.map((d, di) => {
                  const dStr = toISO(d);
                  const isToday = dStr === todayStr;
                  const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                  return <div key={di} className={`gantt-cell${isToday?" today-wk":""}`} style={{minWidth:dayPx,width:dayPx,background:isWeekend?"rgba(255,255,255,0.02)":undefined}}/>;
                })
              : weeks.map((w, wi) => {
                  const wStr = toISO(w);
                  const isToday = wStr <= todayStr && todayStr < toISO(addDays(w,7));
                  return <div key={wi} className={`gantt-cell${isToday?" today-wk":""}`} style={{minWidth:7*dayPx,width:7*dayPx}}/>;
                })
            }
            {faze.map(f => {
              const ph = z.phases?.[f.id];
              if (!ph) return null;
              // Compute cascade visually during drag
              const isDraggingThis = dragging?.zakazkaId === z.id && dragging?.phaseId === f.id && dragging?.active;
              const isAffectedByDrag = dragging?.zakazkaId === z.id && dragging?.active;
              let displayStart = ph.start;
              if (isAffectedByDrag) {
                const cascaded = computeCascade(z.phases, dragging.phaseId, dragging.currentStart);
                displayStart = cascaded[f.id]?.start ?? ph.start;
              }
              const left = dateToPx(displayStart) - LABEL_W;
              const width = ph.dur * dayPx;
              return (
                <div
                  key={f.id}
                  className={`gantt-bar${isDraggingThis?" dragging":""}`}
                  style={{ left, width, background: f.color, minWidth:20 }}
                  onMouseDown={(e) => onMouseDown(e, z.id, f.id, ph.start)}
                  onMouseEnter={(e) => setTooltip({ x: e.clientX+12, y: e.clientY+12, z, f, ph: {...ph, start: displayStart} })}
                  onMouseMove={(e) => setTooltip(t => t ? {...t, x: e.clientX+12, y: e.clientY+12} : null)}
                  onMouseLeave={() => setTooltip(null)}
                >
                  {width > 30 ? f.short : ""}
                </div>
              );
            })}
          </div>
        </div>
      );
    });
  }

  // ── CONNECTORS ────────────────────────────────────────────────────────────
  function renderConnectors() {
    if (!connector) return null;
    return zakazky.map((z, zi) => {
      const ingPhases = INZENYRINK.filter(f => z.phases?.[f.id]);
      const vypPhases = VYROBA_FAZE.filter(f => z.phases?.[f.id]);

      if (ingPhases.length === 0 || vypPhases.length === 0) return null;

      // Last ing phase end → first vyp phase start
      const lastIng = ingPhases.at(-1);
      const firstVyp = vypPhases[0];

      const phIng = z.phases[lastIng.id];
      const phVyp = z.phases[firstVyp.id];

      const isDragIng = dragging?.zakazkaId === z.id && dragging?.phaseId === lastIng.id;
      const isDragVyp = dragging?.zakazkaId === z.id && dragging?.phaseId === firstVyp.id;
      const ingStart = isDragIng ? dragging.currentStart : phIng.start;
      const vypStart = isDragVyp ? dragging.currentStart : phVyp.start;

      const ingEndPx  = dateToPx(toISO(addDays(parseDate(ingStart), phIng.dur))) - LABEL_W;
      const vypStartPx = dateToPx(vypStart) - LABEL_W;

      // We render SVG overlaid absolutely over the entire gantt-body
      // Positions: ING section rows at top, VYP section rows below (with divider 4px)
      const ingRowCount = zakazky.length;
      const dividerH = 4;

      const ingRowY = zi * ROW_H + ROW_H / 2 + sectionHdrH; // middle of ing row
      const vypRowY = ingRowCount * ROW_H + sectionHdrH + dividerH + sectionHdrH + zi * ROW_H + ROW_H / 2; // middle of vyp row

      const gap = phVyp.dur > 0 ? (vypStartPx - ingEndPx) : 0;
      const color = gap < 0 ? "rgba(240,80,96,0.7)" : "rgba(120,130,160,0.5)";

      return (
        <line
          key={z.id}
          x1={LABEL_W + ingEndPx} y1={ingRowY}
          x2={LABEL_W + vypStartPx} y2={vypRowY}
          stroke={color} strokeWidth="1.5" strokeDasharray="4 3"
        />
      );
    });
  }

  const totalH = zakazky.length * ROW_H;
  const totalW = LABEL_W + totalDays * dayPx;
  const sectionHdrH = showDays ? 46 : 30;
  const dividerH = 4;
  const svgH = 2 * sectionHdrH + 2 * totalH + dividerH;

  return (
    <div className="gantt-outer">
      {/* TOOLBAR */}
      <div className="gantt-toolbar">
        <span className="gantt-toolbar-label">Zoom:</span>
        {ZOOM_LEVELS.map((z, i) => (
          <button key={i} className={`btn btn-ghost${zoomIdx===i?" btn-active":""}`} style={{fontSize:10,padding:"5px 9px"}} onClick={() => setZoomIdx(i)}>{z.label}</button>
        ))}
        <div style={{width:1,background:"var(--border)",height:20,margin:"0 4px"}}/>
        <span className="gantt-toolbar-label">Posun:</span>
        <button className="btn btn-ghost" style={{fontSize:10,padding:"5px 9px"}} onClick={() => setStartOffset(p=>p-2)}>←</button>
        <button className="btn btn-ghost" style={{fontSize:10,padding:"5px 9px"}} onClick={() => setStartOffset(0)}>Dnes</button>
        <button className="btn btn-ghost" style={{fontSize:10,padding:"5px 9px"}} onClick={() => setStartOffset(p=>p+2)}>→</button>
        <div style={{width:1,background:"var(--border)",height:20,margin:"0 4px"}}/>
        <button className={`btn btn-ghost${connector?" btn-active":""}`} style={{fontSize:10,padding:"5px 9px"}} onClick={() => setConnector(p=>!p)}>
          🔗 Propojení
        </button>
        <button className={`btn btn-ghost${!showAll?" btn-active":""}`} style={{fontSize:10,padding:"5px 9px"}} onClick={() => setShowAll(p=>!p)}>
          {showAll ? "Aktivní" : "Vše"}
        </button>
        <div style={{marginLeft:"auto",display:"flex",gap:10}}>
          {ALL_FAZE.map(f => (
            <div key={f.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:11}}>
              <div style={{width:10,height:10,borderRadius:2,background:f.color}}/>
              <span style={{color:"var(--muted)"}}>{f.label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* GANTT BODY */}
      <div className="gantt-body" ref={containerRef} style={{position:"relative"}}>
        {zakazky.length === 0 ? (
          <div className="empty"><div className="empty-icon">📊</div><div style={{fontSize:13,color:"var(--muted)"}}>Přidej zakázky tlačítkem + Zakázka</div></div>
        ) : (
          <div style={{position:"relative",width:totalW,minWidth:"100%"}}>

            {/* SVG for connectors */}
            {connector && (
              <svg style={{position:"absolute",top:0,left:0,width:totalW,height:svgH,pointerEvents:"none",zIndex:3}} viewBox={`0 0 ${totalW} ${svgH}`} preserveAspectRatio="none">
                {renderConnectors()}
              </svg>
            )}

            {/* TODAY LINE */}
            {todayOffset >= 0 && todayOffset <= totalDays && (
              <div className="today-line" style={{left: todayPx, height: svgH}}/>
            )}

            {/* ─── INŽENÝRING SEKCE ─── */}
            <div className="gantt-section-hdr" style={{height:sectionHdrH,alignItems:"stretch"}}>
              <div className="gantt-section-label" style={{height:"100%"}}>
                <div className="gantt-section-dot" style={{background:"var(--kon)"}}/>
                Návrh & Konstrukce
              </div>
              <GanttTimeHeader days={days} weeks={weeks} showDays={showDays} dayPx={dayPx} todayStr={todayStr} />
            </div>
            {renderRows(INZENYRINK, "#7c9ef5")}

            {/* ─── DIVIDER ─── */}
            <div className="gantt-divider" style={{width:totalW}}>
              <span className="gantt-divider-label">▼ VÝROBA &amp; MONTÁŽ</span>
            </div>

            {/* ─── VÝROBA SEKCE ─── */}
            <div className="gantt-section-hdr" style={{height:sectionHdrH,alignItems:"stretch"}}>
              <div className="gantt-section-label" style={{height:"100%"}}>
                <div className="gantt-section-dot" style={{background:"var(--vyr)"}}/>
                Výroba &amp; Montáž
              </div>
              <GanttTimeHeader days={days} weeks={weeks} showDays={showDays} dayPx={dayPx} todayStr={todayStr} />
            </div>
            {renderRows(VYROBA_FAZE, "#4af0a0")}

          </div>
        )}
      </div>

      {/* TOOLTIP */}
      {tooltip && (
        <div className="tooltip" style={{left:tooltip.x, top:tooltip.y}}>
          <div style={{color:tooltip.f.color,fontWeight:700,marginBottom:3}}>{tooltip.z.id} · {tooltip.f.label}</div>
          <div>Start: {formatCZ(tooltip.ph.start)}</div>
          <div>Konec: {formatCZ(phaseEnd(tooltip.ph))}</div>
          <div>Délka: {tooltip.ph.dur} dní</div>
        </div>
      )}
    </div>
  );
}

// ─── GANTT TIME HEADER ───────────────────────────────────────────────────────
function GanttTimeHeader({ days, weeks, showDays, dayPx, todayStr }) {
  const DAY_NAMES = ["Ne","Po","Út","St","Čt","Pá","So"];

  if (showDays) {
    // Two-row header: month/week label on top, individual days below
    // Group days by week for the top row
    const weekGroups = [];
    let cur = null;
    days.forEach((d, i) => {
      const wk = getISOWeek(d);
      const mo = d.getMonth();
      const key = `${d.getFullYear()}-${wk}`;
      if (!cur || cur.key !== key) {
        cur = { key, label: `T${wk} · ${d.toLocaleDateString("cs-CZ",{month:"short"})}`, count: 0, startIdx: i };
        weekGroups.push(cur);
      }
      cur.count++;
    });

    return (
      <div className="gantt-weeks-hdr" style={{flexDirection:"column",flex:1}}>
        {/* Top row: week + month */}
        <div style={{display:"flex",borderBottom:"1px solid var(--border2)"}}>
          {weekGroups.map((g,i) => (
            <div key={i} style={{minWidth:g.count*dayPx,width:g.count*dayPx,padding:"3px 5px",fontSize:9,fontFamily:"IBM Plex Mono,monospace",color:"var(--muted)",borderRight:"1px solid var(--border)",overflow:"hidden",whiteSpace:"nowrap",letterSpacing:"0.5px"}}>
              {g.label}
            </div>
          ))}
        </div>
        {/* Bottom row: individual days */}
        <div style={{display:"flex"}}>
          {days.map((d, i) => {
            const dStr = toISO(d);
            const isToday = dStr === todayStr;
            const isWeekend = d.getDay() === 0 || d.getDay() === 6;
            const dayName = DAY_NAMES[d.getDay()];
            return (
              <div key={i} style={{
                minWidth:dayPx, width:dayPx,
                padding:"3px 2px",
                textAlign:"center",
                fontSize:9,
                fontFamily:"IBM Plex Mono,monospace",
                color: isToday ? "var(--kst)" : isWeekend ? "var(--muted2)" : "var(--muted)",
                background: isToday ? "rgba(240,192,64,0.1)" : isWeekend ? "rgba(255,255,255,0.015)" : "transparent",
                borderRight:"1px solid var(--border)",
                lineHeight:1.3,
                overflow:"hidden",
              }}>
                {dayPx >= 20 ? <>{dayName}<br/><span style={{fontSize:8,opacity:0.7}}>{d.getDate()}</span></> : d.getDate()}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // Week view (zoomed out)
  return (
    <div className="gantt-weeks-hdr">
      {weeks.map((w, i) => {
        const isToday = toISO(w) <= todayStr && todayStr < toISO(addDays(w, 7));
        return (
          <div key={i} className={`gantt-week-hdr${isToday?" today-wk":""}`} style={{minWidth:7*dayPx,width:7*dayPx}}>
            T{getISOWeek(w)}<br/>
            <span style={{fontSize:8,opacity:0.6}}>{w.getDate()}.{w.getMonth()+1}</span>
          </div>
        );
      })}
    </div>
  );
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function ZakazkaModal({ zakazka, onSave, onDelete, onClose }) {
  const isEdit = !!zakazka;
  const genId = () => `Z-${String(Date.now()).slice(-4)}`;

  const defaultPhase = (offsetDays, dur) => ({
    start: toISO(addDays(new Date(), offsetDays)), dur
  });

  const [form, setForm] = useState(() => ({
    id:       zakazka?.id || genId(),
    name:     zakazka?.name || "",
    customer: zakazka?.customer || "",
    stav:     zakazka?.stav || "Nová",
    note:     zakazka?.note || "",
    phases: {
      koncepce:   zakazka?.phases?.koncepce   || defaultPhase(0,  7),
      konstrukce: zakazka?.phases?.konstrukce || defaultPhase(7,  14),
      vyroba:     zakazka?.phases?.vyroba     || defaultPhase(21, 20),
      montaz:     zakazka?.phases?.montaz     || defaultPhase(41, 5),
    }
  }));

  const setPhaseDur = (id, val) =>
    setForm(p => ({ ...p, phases: { ...p.phases, [id]: { ...p.phases[id], dur: Math.max(1, parseInt(val)||1) } } }));
  const setPhaseStart = (id, val) =>
    setForm(p => ({ ...p, phases: { ...p.phases, [id]: { ...p.phases[id], start: val } } }));

  const handleSave = () => { if (!form.name || !form.id.trim()) return; onSave({...form, id: form.id.trim()}); };

  const renderFazeGroup = (faze, title, dotColor) => (
    <div className="faze-section">
      <div className="faze-section-title">
        <div className="faze-sec-dot" style={{background:dotColor}}/>
        {title}
      </div>
      {faze.map(f => (
        <div className="faze-inp-row" key={f.id}>
          <div className="faze-inp-label">
            <div className="faze-inp-dot" style={{background:f.color}}/>
            {f.label}
          </div>
          <input type="date" value={form.phases[f.id]?.start||""} onChange={e=>setPhaseStart(f.id, e.target.value)} />
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <input type="number" min={1} max={999} value={form.phases[f.id]?.dur||0} onChange={e=>setPhaseDur(f.id, e.target.value)} style={{width:55,textAlign:"center"}} />
            <span className="faze-unit">dní</span>
          </div>
        </div>
      ))}
    </div>
  );

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-title">⚙ {isEdit ? `Zakázka ${zakazka.id}` : "Nová zakázka"}</div>

        <div className="form-row">
          <div className="form-group">
            <label>Číslo / ID zakázky *</label>
            <input value={form.id} onChange={e=>setForm(p=>({...p,id:e.target.value}))} placeholder="2024-047" style={{fontFamily:"IBM Plex Mono,monospace",color:"var(--kst)"}} />
          </div>
          <div className="form-group">
            <label>Stav</label>
            <select value={form.stav} onChange={e=>setForm(p=>({...p,stav:e.target.value}))}>
              {STAV_OPTIONS.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label>Název zakázky *</label>
            <input value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Schodiště Brno..." />
          </div>
          <div className="form-group">
            <label>Zákazník</label>
            <input value={form.customer} onChange={e=>setForm(p=>({...p,customer:e.target.value}))} placeholder="Firma / jméno" />
          </div>
        </div>


        {renderFazeGroup(INZENYRINK, "Návrh & Konstrukce", "#7c9ef5")}
        {renderFazeGroup(VYROBA_FAZE, "Výroba & Montáž", "#4af0a0")}

        <div className="form-group">
          <label>Poznámka</label>
          <textarea rows={2} value={form.note} onChange={e=>setForm(p=>({...p,note:e.target.value}))} placeholder="Interní poznámka..."/>
        </div>

        <div className="modal-footer">
          {isEdit && <button className="btn btn-danger" onClick={()=>{if(confirm("Smazat zakázku?"))onDelete(zakazka.id);}}>Smazat</button>}
          <button className="btn btn-ghost" onClick={onClose}>Zrušit</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={!form.name || !form.id.trim()}>
            {isEdit ? "Uložit" : "Přidat"}
          </button>
        </div>
      </div>
    </div>
  );
}
